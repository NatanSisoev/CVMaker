# Pre-commit hooks. Install with: pre-commit install
# Run on demand with:           pre-commit run --all-files
#
# Keep this file small. Anything complicated belongs in pyproject.toml
# so the same config governs CI, editors, and this file.

default_language_version:
  # Match the project's runtime (uv-managed CPython 3.13). If you don't have
  # python3.13 on PATH yet, run `uv python install 3.13` then make sure
  # `~/.local/bin` (Linux/macOS) or `%LOCALAPPDATA%\uv\python\...` (Windows)
  # is on PATH -- pre-commit asks `virtualenv` to find this interpreter.
  python: python3.13

repos:
  # ----- generic hygiene -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.svg$
      - id: end-of-file-fixer
        exclude: \.svg$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # ----- Ruff: lint + format (replaces black, isort, flake8, pyupgrade) -----
  # Keep this rev close to whatever `uv` is resolving for the dev group; older
  # mirrors don't know newer rules (e.g. RUF059), and the hook errors out with
  # "Unknown rule selector" if pyproject.toml references one it doesn't have.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ----- Django template lint -----
  # Both hooks run on demand only -- the legacy Bootstrap templates fail a
  # batch of T002/T003/H021/H029 rules that don't matter to ship Phase 2,
  # and Phase 4 rewrites every template in Tailwind + Cotton anyway. Run
  # manually with: `pre-commit run djlint-django --hook-stage manual`.
  - repo: https://github.com/djlint/djLint
    rev: v1.36.3
    hooks:
      - id: djlint-reformat-django
        stages: [manual]
      - id: djlint-django
        stages: [manual]

  # ----- Django-specific upgrades -----
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        args: [--target-version, "5.1"]

  # ----- Types (informational; doesn't block commit) -----
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - django-stubs[compatible-mypy]
          - django-environ
        # `pass_filenames: false` means we have to tell mypy WHAT to check via
        # args; the `files:` filter on its own would be ignored. We hard-pin
        # `src` + `apps` so the same set is type-checked locally and in CI.
        args: [--config-file=pyproject.toml, src, apps]
        pass_filenames: false
        # mypy is strict; flip to stages=[manual] if it gets in the way.
        stages: [manual]
