# Local dev stack.
#
# Services:
#   web      — Django via gunicorn+uvicorn (in-image dev uses runserver, see
#              the override below for `make dev`).
#   worker   — placeholder RQ worker (Phase 3 wires in actual jobs).
#   postgres — primary datastore.
#   redis    — cache + render queue.
#   minio    — S3-compatible object store for rendered PDFs and uploads.
#
# Secrets come from a local .env (see .env.example). The web/worker images
# default DJANGO_SETTINGS_MODULE to prod so people don't accidentally run dev
# code in a container; set it to dev explicitly when you want DEBUG=True.

name: cvmaker

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-cvmaker.settings.dev}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-cvmaker}
      - DB_USER=${DB_USER:-cvmaker}
      - DB_PASSWORD=${DB_PASSWORD:-cvmaker-dev}
      - REDIS_URL=redis://redis:6379/0
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minio-root
      - AWS_SECRET_ACCESS_KEY=minio-root-secret
      - AWS_STORAGE_BUCKET_NAME=cvmaker-local
      - RUN_MIGRATIONS=1
    ports:
      - "8000:8000"
    volumes:
      - .:/app              # live-reload source
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-cvmaker.settings.dev}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-cvmaker}
      - DB_USER=${DB_USER:-cvmaker}
      - DB_PASSWORD=${DB_PASSWORD:-cvmaker-dev}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-cvmaker}
      - POSTGRES_USER=${DB_USER:-cvmaker}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-cvmaker-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cvmaker} -d ${DB_NAME:-cvmaker}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio-root
      - MINIO_ROOT_PASSWORD=minio-root-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  media:
